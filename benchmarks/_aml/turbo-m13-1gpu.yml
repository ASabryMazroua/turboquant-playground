$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command
experiment_name: turbo-kv-lab
display_name: turbo-m13-value-groups-1gpu

compute: /subscriptions/<SUBSCRIPTION_ID>/resourceGroups/<RESOURCE_GROUP>/providers/Microsoft.MachineLearningServices/virtualclusters/<VIRTUAL_CLUSTER>

environment:
  image: mcr.microsoft.com/aifx/acpt/stable-ubuntu2004-cu121-py310-torch22x:biweekly.202410.1

code: ../..

# M13 — group-wise VALUE quantization (KIVI/AWQ). Values were quantized per-token
# with ONE int4 scale over all 64 head coordinates; when intra-head coordinate
# magnitude varies, that single scale is set by the largest sub-block and wastes
# the int4 grid on the rest. KIVI/AWQ quantize values per-token but in GROUPS
# (one affine scale/zero per group of value_group_size coords), giving each
# sub-block its own range. VALUES only — keys keep their per-channel scheme. The
# residual_length BF16 window IS the KIVI residual buffer (recent tokens kept
# full precision, evicted in chunks). This job sweeps value_group_size={0,32} on
# WikiText with per_channel keys + post-RoPE. value_group_size=0 is byte-for-byte
# the whole-head cache. pytest gate includes the value-group cache tests;
# datasets for WikiText.
command: >-
  printf 'torch==2.2.2\ntorchvision==0.17.2\ntorchaudio==2.2.2\n' > /tmp/constraints.txt &&
  (pip install -q -c /tmp/constraints.txt "transformers==4.45.2" "accelerate==0.34.2" "datasets==2.21.0" pandas pytest || pip install -q --user -c /tmp/constraints.txt "transformers==4.45.2" "accelerate==0.34.2" "datasets==2.21.0" pandas pytest) &&
  python -c "import torch; print('torch', torch.__version__, 'cuda', torch.cuda.is_available(), torch.cuda.get_device_name(0) if torch.cuda.is_available() else 'no-cuda')" &&
  python -m pytest tests/test_cache.py tests/test_qjl.py tests/test_value_groups.py -q 2>&1 | tee outputs/pytest_m13.txt &&
  python -u benchmarks/benchmark_qwen_turbo.py --model-path Qwen/Qwen2.5-0.5B-Instruct --contexts 4096,8192,16384 --steps 32 --eval-tokens 256 --rotations none --residual-length 128 --sink-lengths 0 --key-quants per_channel --rope-modes post --bf16-layers 0 --key-outliers 0 --value-group-sizes 0,32 --corpus wikitext --out-dir outputs

resources:
  instance_count: 1
  instance_type: Singularity.ND48am_A100_v4   # 4x A100 80GB node; 1 GPU used via CUDA_VISIBLE_DEVICES
  properties:
    AISuperComputer:
      interactive: false
      virtualClusterArmId: /subscriptions/<SUBSCRIPTION_ID>/resourceGroups/<RESOURCE_GROUP>/providers/Microsoft.MachineLearningServices/virtualclusters/<VIRTUAL_CLUSTER>
      slaTier: Standard
      priority: Medium

environment_variables:
  _AZUREML_SINGULARITY_JOB_UAI: /subscriptions/<SUBSCRIPTION_ID>/resourcegroups/<RESOURCE_GROUP>/providers/Microsoft.ManagedIdentity/userAssignedIdentities/<USER_ASSIGNED_IDENTITY>
  AZUREML_COMPUTE_USE_COMMON_RUNTIME: "true"
  SINGULARITY_CUSTOM_IMAGE: "true"
  SINGULARITY_CUSTOM_IMAGE_COMMANDS: "USER root"
  CUDA_VISIBLE_DEVICES: "0"
  HF_HUB_DISABLE_TELEMETRY: "1"
  HF_DATASETS_TRUST_REMOTE_CODE: "1"
