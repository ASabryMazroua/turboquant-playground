$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command
experiment_name: turbo-kv-lab
display_name: turbo-m15-int4-tc-kernel-1gpu

compute: /subscriptions/<SUBSCRIPTION_ID>/resourceGroups/<RESOURCE_GROUP>/providers/Microsoft.MachineLearningServices/virtualclusters/<VIRTUAL_CLUSTER>

environment:
  image: mcr.microsoft.com/aifx/acpt/stable-ubuntu2004-cu121-py310-torch22x:biweekly.202410.1

code: ../..

# M15 tensor-core int4 logits kernel. Reconstructs the int4 key tile to bf16
# in SRAM and runs tl.dot(allow_tf32=True) so the int4 GEMM lands on tensor
# cores (vs M5's allow_tf32=False CUDA-core path), while keeping M5's no-full-
# dequant memory property. Gate = reference-equality tests (M5 1e-3 + M15 TC
# 1e-2) MUST pass before the microbench runs (&&). The microbench compares the
# TC kernel against the M5 exact int4 kernel and the plain bf16 cuBLAS baseline
# on correctness, latency (triton.testing.do_bench) and peak memory. Triton
# 2.2.0 ships in the ACPT image; root-independent pip; NO transformers (pure
# Triton like M5).
command: >-
  printf 'torch==2.2.2\ntorchvision==0.17.2\ntorchaudio==2.2.2\ntriton==2.2.0\n' > /tmp/constraints.txt &&
  (pip install -q -c /tmp/constraints.txt pandas pytest || pip install -q --user -c /tmp/constraints.txt pandas pytest) &&
  python -c "import torch, triton; print('torch', torch.__version__, 'triton', triton.__version__, torch.cuda.get_device_name(0))" &&
  python -m pytest tests/test_kernels.py tests/test_kernels_tc.py -q 2>&1 | tee outputs/pytest_m15.txt &&
  python -u benchmarks/benchmark_attention_micro_tc.py --nq 1,16,64,256 --nk 1024,4096,16384 --head-dim 64 --out-dir outputs

resources:
  instance_count: 1
  instance_type: Singularity.ND48am_A100_v4   # 4x A100 80GB node; 1 GPU used via CUDA_VISIBLE_DEVICES
  properties:
    AISuperComputer:
      interactive: false
      virtualClusterArmId: /subscriptions/<SUBSCRIPTION_ID>/resourceGroups/<RESOURCE_GROUP>/providers/Microsoft.MachineLearningServices/virtualclusters/<VIRTUAL_CLUSTER>
      slaTier: Standard
      priority: Medium

environment_variables:
  _AZUREML_SINGULARITY_JOB_UAI: /subscriptions/<SUBSCRIPTION_ID>/resourcegroups/<RESOURCE_GROUP>/providers/Microsoft.ManagedIdentity/userAssignedIdentities/<USER_ASSIGNED_IDENTITY>
  AZUREML_COMPUTE_USE_COMMON_RUNTIME: "true"
  SINGULARITY_CUSTOM_IMAGE: "true"
  SINGULARITY_CUSTOM_IMAGE_COMMANDS: "USER root"
  CUDA_VISIBLE_DEVICES: "0"
  HF_HUB_DISABLE_TELEMETRY: "1"
