$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command
experiment_name: turbo-kv-lab
display_name: turbo-m16-qjl-end-to-end-1gpu

compute: /subscriptions/<SUBSCRIPTION_ID>/resourceGroups/<RESOURCE_GROUP>/providers/Microsoft.MachineLearningServices/virtualclusters/<VIRTUAL_CLUSTER>

environment:
  image: mcr.microsoft.com/aifx/acpt/stable-ubuntu2004-cu121-py310-torch22x:biweekly.202410.1

code: ../..

# M16 — wire QJL into END-TO-END generation (the README "natural next step").
# M6/M11 validated the unbiased inner-product sign sketch only as a NUMERIC
# study; this job uses it in real Qwen2 generation via the new custom attention
# path (TurboKVCache.qjl_update_and_attend + qwen_patch QJL branch): the cache
# estimates qᵀk from sign(S·Rk) + ‖Rk‖ (no key reconstruction, no SDPA), keeps
# recent tokens exact in a BF16 window, and chunks the query so a 16k prefill
# never materialises the full [q,T] score matrix. The WikiText eval compares the
# three key caches at matched context: per_token int4 (the M4 disaster 15-57×),
# per_channel int4 (the M7 redemption ~1.01×), and qjl (M16). The pytest gate
# (cache + qjl + qjl-direct + qjl-e2e) MUST pass before the benchmark runs (&&).
# datasets for WikiText-2; transformers 4.45.2; root-independent pinned pip.
command: >-
  printf 'torch==2.2.2\ntorchvision==0.17.2\ntorchaudio==2.2.2\n' > /tmp/constraints.txt &&
  (pip install -q -c /tmp/constraints.txt "transformers==4.45.2" "accelerate==0.34.2" "datasets==2.21.0" pandas pytest || pip install -q --user -c /tmp/constraints.txt "transformers==4.45.2" "accelerate==0.34.2" "datasets==2.21.0" pandas pytest) &&
  python -c "import torch; print('torch', torch.__version__, 'cuda', torch.cuda.is_available(), torch.cuda.get_device_name(0) if torch.cuda.is_available() else 'no-cuda')" &&
  python -m pytest tests/test_cache.py tests/test_qjl.py tests/test_qjl_direct.py tests/test_qjl_e2e.py -q 2>&1 | tee outputs/pytest_m16.txt &&
  python -u benchmarks/benchmark_qwen_turbo.py --model-path Qwen/Qwen2.5-0.5B-Instruct --contexts 4096,8192,16384 --steps 32 --eval-tokens 256 --rotations none,rht --residual-length 128 --sink-lengths 0 --key-quants per_token,per_channel,qjl --qjl-m 256,512 --qjl-outliers 0,8 --rope-modes post --corpus wikitext --out-dir outputs

resources:
  instance_count: 1
  instance_type: Singularity.ND48am_A100_v4   # 4x A100 80GB node; 1 GPU used via CUDA_VISIBLE_DEVICES
  properties:
    AISuperComputer:
      interactive: false
      virtualClusterArmId: /subscriptions/<SUBSCRIPTION_ID>/resourceGroups/<RESOURCE_GROUP>/providers/Microsoft.MachineLearningServices/virtualclusters/<VIRTUAL_CLUSTER>
      slaTier: Standard
      priority: Medium

environment_variables:
  _AZUREML_SINGULARITY_JOB_UAI: /subscriptions/<SUBSCRIPTION_ID>/resourcegroups/<RESOURCE_GROUP>/providers/Microsoft.ManagedIdentity/userAssignedIdentities/<USER_ASSIGNED_IDENTITY>
  AZUREML_COMPUTE_USE_COMMON_RUNTIME: "true"
  SINGULARITY_CUSTOM_IMAGE: "true"
  SINGULARITY_CUSTOM_IMAGE_COMMANDS: "USER root"
  CUDA_VISIBLE_DEVICES: "0"
  HF_HUB_DISABLE_TELEMETRY: "1"
  HF_DATASETS_TRUST_REMOTE_CODE: "1"
