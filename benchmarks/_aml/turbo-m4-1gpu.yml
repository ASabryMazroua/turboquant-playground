$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command
experiment_name: turbo-kv-lab
display_name: turbo-m4-qwen-patch-1gpu

compute: /subscriptions/<SUBSCRIPTION_ID>/resourceGroups/<RESOURCE_GROUP>/providers/Microsoft.MachineLearningServices/virtualclusters/<VIRTUAL_CLUSTER>

environment:
  image: mcr.microsoft.com/aifx/acpt/stable-ubuntu2004-cu121-py310-torch22x:biweekly.202410.1

code: ../..

# torch pinned via constraints so transformers/pytest installs cannot upgrade the
# cu121 build. M4 gate = patch math identity tests (rotate-query preserves logits,
# value rotation + single inverse recovers output) MUST pass before the e2e
# benchmark runs (&&). The benchmark patches Qwen2 attention with the rotate-query
# int4 KV path and compares teacher-forced quality, perplexity, decode latency and
# peak memory vs BF16 at ctx {8k,16k} for rotations {rht, none, dense-control},
# plus torch.profiler op breakdown + per-layer attn-output divergence. nsys is
# installed best-effort for an NVTX timeline confirming one inverse-rotation/head.
command: >-
  printf 'torch==2.2.2\ntorchvision==0.17.2\ntorchaudio==2.2.2\n' > /tmp/constraints.txt &&
  (pip install -q -c /tmp/constraints.txt "transformers==4.45.2" "accelerate==0.34.2" pandas pytest || pip install -q --user -c /tmp/constraints.txt "transformers==4.45.2" "accelerate==0.34.2" pandas pytest) &&
  python -c "import torch; print('torch', torch.__version__, 'cuda', torch.cuda.is_available(), torch.cuda.get_device_name(0) if torch.cuda.is_available() else 'no-cuda')" &&
  python -m pytest tests/ -q 2>&1 | tee outputs/pytest_m4.txt &&
  python -u benchmarks/benchmark_qwen_turbo.py --model-path Qwen/Qwen2.5-0.5B-Instruct --contexts 4096,8192,16384 --steps 32 --eval-tokens 256 --rotations rht,none,dense --residual-length 128 --sink-lengths 0,4 --out-dir outputs ;
  (apt-get update -qq && apt-get install -y -qq nsight-systems-cli >/dev/null 2>&1 || apt-get install -y -qq nsight-systems >/dev/null 2>&1) ;
  (command -v nsys >/dev/null 2>&1 && nsys profile -t cuda,nvtx -o outputs/m4_decode_timeline --force-overwrite true python -u benchmarks/benchmark_qwen_turbo.py --model-path Qwen/Qwen2.5-0.5B-Instruct --contexts 8192 --steps 8 --eval-tokens 32 --rotations rht --residual-length 128 --out-dir outputs/_nsys && echo "nsys capture ok") || echo "nsys unavailable - skipped (torch.profiler op breakdown already captured)"

resources:
  instance_count: 1
  instance_type: Singularity.ND48am_A100_v4   # 4x A100 80GB node; 1 GPU used via CUDA_VISIBLE_DEVICES
  properties:
    AISuperComputer:
      interactive: false
      virtualClusterArmId: /subscriptions/<SUBSCRIPTION_ID>/resourceGroups/<RESOURCE_GROUP>/providers/Microsoft.MachineLearningServices/virtualclusters/<VIRTUAL_CLUSTER>
      slaTier: Standard
      priority: Medium

environment_variables:
  _AZUREML_SINGULARITY_JOB_UAI: /subscriptions/<SUBSCRIPTION_ID>/resourcegroups/<RESOURCE_GROUP>/providers/Microsoft.ManagedIdentity/userAssignedIdentities/<USER_ASSIGNED_IDENTITY>
  AZUREML_COMPUTE_USE_COMMON_RUNTIME: "true"
  SINGULARITY_CUSTOM_IMAGE: "true"
  SINGULARITY_CUSTOM_IMAGE_COMMANDS: "USER root"
  CUDA_VISIBLE_DEVICES: "0"
  HF_HUB_DISABLE_TELEMETRY: "1"
