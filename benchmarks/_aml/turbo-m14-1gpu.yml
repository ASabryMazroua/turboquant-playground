$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command
experiment_name: turbo-kv-lab
display_name: turbo-m14-sink-combo-1gpu

compute: /subscriptions/<SUBSCRIPTION_ID>/resourceGroups/<RESOURCE_GROUP>/providers/Microsoft.MachineLearningServices/virtualclusters/<VIRTUAL_CLUSTER>

environment:
  image: mcr.microsoft.com/aifx/acpt/stable-ubuntu2004-cu121-py310-torch22x:biweekly.202410.1

code: ../..

# M14 — attention-sink + per-channel-keys combination (KVQuant/StreamingLLM). The
# field's actual recipe keeps the first few tokens in fp16 (the attention sink)
# AND quantizes keys per-channel. M4 found a BF16 sink gave only minor relief for
# the THEN-current per-TOKEN keys (the modest_morning run) — that was BEFORE
# per-channel keys (M7). This job re-examines the sink as a COMPLEMENT to
# per-channel keys: per-channel already handles the outlier key channels, so a
# small fp16 sink is a cheap complement that should not hurt (ideally helps at the
# largest ctx), while for per-token the sink alone stays insufficient (M4
# reproduced). Sweeps sink_length={0,4,16} x key_quant={per_token,per_channel} on
# WikiText, post-RoPE. sink_length=0 is byte-for-byte the no-sink cache. pytest
# gate includes the sink-combo cache tests; datasets for WikiText.
command: >-
  printf 'torch==2.2.2\ntorchvision==0.17.2\ntorchaudio==2.2.2\n' > /tmp/constraints.txt &&
  (pip install -q -c /tmp/constraints.txt "transformers==4.45.2" "accelerate==0.34.2" "datasets==2.21.0" pandas pytest || pip install -q --user -c /tmp/constraints.txt "transformers==4.45.2" "accelerate==0.34.2" "datasets==2.21.0" pandas pytest) &&
  python -c "import torch; print('torch', torch.__version__, 'cuda', torch.cuda.is_available(), torch.cuda.get_device_name(0) if torch.cuda.is_available() else 'no-cuda')" &&
  python -m pytest tests/test_cache.py tests/test_qjl.py tests/test_sink_combo.py -q 2>&1 | tee outputs/pytest_m14.txt &&
  python -u benchmarks/benchmark_qwen_turbo.py --model-path Qwen/Qwen2.5-0.5B-Instruct --contexts 4096,8192,16384 --steps 32 --eval-tokens 256 --rotations none --residual-length 128 --sink-lengths 0,4,16 --key-quants per_token,per_channel --rope-modes post --bf16-layers 0 --key-outliers 0 --value-group-sizes 0 --corpus wikitext --out-dir outputs

resources:
  instance_count: 1
  instance_type: Singularity.ND48am_A100_v4   # 4x A100 80GB node; 1 GPU used via CUDA_VISIBLE_DEVICES
  properties:
    AISuperComputer:
      interactive: false
      virtualClusterArmId: /subscriptions/<SUBSCRIPTION_ID>/resourceGroups/<RESOURCE_GROUP>/providers/Microsoft.MachineLearningServices/virtualclusters/<VIRTUAL_CLUSTER>
      slaTier: Standard
      priority: Medium

environment_variables:
  _AZUREML_SINGULARITY_JOB_UAI: /subscriptions/<SUBSCRIPTION_ID>/resourcegroups/<RESOURCE_GROUP>/providers/Microsoft.ManagedIdentity/userAssignedIdentities/<USER_ASSIGNED_IDENTITY>
  AZUREML_COMPUTE_USE_COMMON_RUNTIME: "true"
  SINGULARITY_CUSTOM_IMAGE: "true"
  SINGULARITY_CUSTOM_IMAGE_COMMANDS: "USER root"
  CUDA_VISIBLE_DEVICES: "0"
  HF_HUB_DISABLE_TELEMETRY: "1"
  HF_DATASETS_TRUST_REMOTE_CODE: "1"
